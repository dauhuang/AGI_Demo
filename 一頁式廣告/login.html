<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業登入 — Airiti Global R&D Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        fadeIn: 'fadeIn 0.5s ease-out forwards',
                        slideUp: 'slideUp 0.6s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05);
        }
        .dot-grid {
            background-size: 30px 30px;
            background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background decorations -->
    <div class="absolute inset-0 dot-grid opacity-50"></div>
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-indigo-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-0 right-0 w-[600px] h-[600px] bg-rose-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md px-6 relative z-10">


        <!-- Login Card -->
        <div class="glass-card rounded-3xl p-8 md:p-10 animate-slideUp">
            <div class="mb-8 text-center">
                <h1 class="text-2xl font-black text-slate-900 mb-2">登入企業帳戶</h1>
                <p class="text-slate-500 text-sm">請輸入您的企業信箱與密碼</p>
            </div>

            <form id="loginForm" onsubmit="event.preventDefault(); window.location.href='../index.html';">
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1.5">企業信箱</label>
                        <input type="email" required placeholder="name@company.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <label class="block text-xs font-bold text-slate-500">密碼</label>
                            <a href="#" class="text-xs font-semibold text-indigo-600 hover:text-indigo-700">忘記密碼？</a>
                        </div>
                        <input type="password" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
                    </div>
                </div>

                <div class="mt-8">
                    <button type="submit" class="w-full py-3.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-600/20 flex items-center justify-center gap-2">
                        登入
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </div>
            </form>
            
            <div class="mt-8 text-center border-t border-slate-100 pt-6">
                <p class="text-sm text-slate-500">尚未申請企業帳戶？ <a href="index.html" class="font-bold text-indigo-600 hover:text-indigo-700">了解方案並預約演示</a></p>
            </div>
        </div>

        <div class="text-center mt-8 animate-fadeIn" style="animation-delay: 0.2s;">
            <p class="text-xs text-slate-400">&copy; 2026 華藝數位股份有限公司 All rights reserved.</p>
        </div>
    </div>
</body>

</html>
