                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 pt-5 border-t border-slate-50">
                                    {[
                                        { label: tr.totalPubs, val: author.pubTrend?.reduce((a, b) => a + b.count, 0) || 0, color: 'text-slate-800' },
                                        { label: tr.totalCit, val: author.totalCitations, color: 'text-slate-800' },
                                        { label: tr.hIdx, val: author.hIndex, color: 'text-indigo-600' },
                                    ].map(({ label, val, color }) => (
                                        <div key={label}>
                                            <div className="text-[10px] text-slate-400 font-black uppercase tracking-wider mb-1">{label}</div>
                                            <div className={`text-2xl font-black font-mono ${color}`}>{val}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-6 bg-slate-50 border border-slate-100 p-5 rounded-2xl animate-fadeIn">
                                    <h3 className="text-slate-800 font-bold text-sm mb-3.5 flex items-center gap-2">
                                        <Tag className="w-4 h-4 text-indigo-500 animate-pulse" />
                                        {tr.collabTitle}
                                    </h3>
                                    <div className="flex flex-wrap gap-2">
                                        {author.keywords?.map((kw, idx) => (
                                            <div
                                                key={idx}
                                                className="group flex items-center gap-2 bg-white hover:bg-indigo-50 border border-slate-200/80 hover:border-indigo-200 px-3 py-1.5 rounded-xl text-xs font-semibold text-slate-600 hover:text-indigo-700 transition-all duration-300 shadow-sm hover:shadow-md cursor-default transform hover:-translate-y-0.5"
                                            >
                                                <span>{kw.text}</span>
                                                <span className="bg-slate-100 group-hover:bg-indigo-100 text-[10px] text-slate-400 group-hover:text-indigo-600 font-bold px-1.5 py-0.5 rounded-md font-mono transition-colors">
                                                    {kw.value}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 space-y-6">
                            {/* Yearly chart */}
                            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-7">
                                <h3 className="text-base font-black text-slate-900 mb-1 flex items-center gap-2"><Activity className="w-4 h-4 text-indigo-500" />{tr.yearlyTitle}</h3>
                                <p className="text-xs text-slate-400 mb-5 pb-4 border-b border-slate-50">{tr.yearlyDesc}</p>
                                <div className="h-72">
                                    {author.pubTrend?.length > 0 ? (
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={author.pubTrend} margin={{ top: 10, right: 20, bottom: 10, left: 0 }}>
                                                <CartesianGrid stroke="#f1f5f9" vertical={false} />
                                                <XAxis dataKey="year" tick={{ fill: '#94a3b8', fontSize: 11 }} axisLine={false} tickLine={false} />
                                                <YAxis yAxisId="left" tick={{ fill: '#94a3b8', fontSize: 11 }} axisLine={false} tickLine={false} />
                                                <YAxis yAxisId="right" orientation="right" tick={{ fill: '#94a3b8', fontSize: 11 }} axisLine={false} tickLine={false} />
                                                <RTooltip contentStyle={{ backgroundColor: '#fff', borderColor: '#e2e8f0', borderRadius: '12px', boxShadow: '0 4px 20px rgba(0,0,0,0.08)', fontSize: '12px' }} />
                                                <Legend wrapperStyle={{ paddingTop: '16px', fontSize: '12px' }} />
                                                <Bar yAxisId="left" dataKey="count" fill="#818cf8" barSize={32} radius={[4, 4, 0, 0]} name={tr.pubsLabel} />
                                                <Line yAxisId="right" type="monotone" dataKey="citations" stroke="#f59e0b" strokeWidth={2.5} dot={{ r: 4, fill: '#f59e0b', stroke: '#fff', strokeWidth: 2 }} name={tr.citedLabel} />
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    ) : (
                                        <div className="flex items-center justify-center h-full text-slate-400 text-sm">{tr.noPubData}</div>
                                    )}
                                </div>
                            </div>
                            {/* Papers */}
                            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-7">
                                <h3 className="text-base font-black text-slate-900 mb-5 pb-4 border-b border-slate-50 flex items-center gap-2"><BookOpen className="w-4 h-4 text-indigo-500" />{tr.papersTitle}</h3>
                                <div className="space-y-4">
                                    {author.topPapers?.map((p, i) => (
                                        <div key={i} className="flex gap-4 p-4 rounded-xl border border-slate-50 hover:border-indigo-100 hover:bg-indigo-50/30 transition-all group cursor-pointer">
                                            <div className="text-xs font-mono font-black text-slate-300 group-hover:text-indigo-400 min-w-[40px]">{p.year}</div>
                                            <div>
                                                <h4 className="font-bold text-slate-800 group-hover:text-indigo-700 transition-colors text-sm mb-1.5">{p.title}</h4>
                                                <div className="flex items-center gap-3 text-xs text-slate-400">
                                                    <span className="italic">{p.journal}</span>
                                                    <span className="flex items-center gap-1"><FileText className="w-3 h-3" />被引用: {p.citations}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="space-y-6">
                            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-7">
                                <h3 className="text-base font-black text-slate-900 mb-5 pb-4 border-b border-slate-50 flex items-center gap-2"><Network className="w-4 h-4 text-indigo-500" />{tr.ecoTitle}</h3>
                                <div>
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">{tr.coAuthTitle}</h4>
                                    {author.coAuthorsDetails?.length > 0 ? (
                                        <div className="space-y-2">
                                            {author.coAuthorsDetails.map((co, i) => (
                                                <div key={i} className="flex items-center gap-3 p-2.5 hover:bg-slate-50 rounded-xl transition-colors">
                                                    <div className="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center font-bold text-indigo-600 text-xs">{co.name[0]}</div>
                                                    <div>
                                                        <div className="font-bold text-sm text-slate-800">{co.name}</div>
                                                        <div className="text-xs text-slate-400">{co.type} · {co.role}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <p className="text-sm text-slate-400">—</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ─── REPORTS LIST ──────────────────────────────────────────────
        const ReportsListPage = ({ setView, isLoggedIn, setIsLoggedIn, tr }) => (
            <div className="animate-fadeIn max-w-5xl mx-auto px-6 py-12 min-h-[70vh]">
                <button onClick={() => setView('landing')} className="flex items-center gap-1.5 text-sm text-slate-500 hover:text-indigo-600 mb-8 transition-colors font-medium">
                    <ArrowLeft className="w-4 h-4" />{tr.backHome}
                </button>
                <div className="mb-10">
                    <h1 className="text-3xl font-black text-slate-900 mb-2">{tr.reportsPageTitle}</h1>
                    <p className="text-slate-500">{tr.reportsPageDesc}</p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    {historicalReports.map(r => (
                        <div key={r.id} className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm card-hover flex flex-col justify-between">
                            <div>
                                <div className="flex justify-between items-start mb-3">
                                    <span className={`text-[10px] font-black px-2.5 py-1 rounded-lg uppercase tracking-wider ${r.type === '最新發布' ? 'bg-amber-100 text-amber-700' : 'bg-indigo-50 text-indigo-600'}`}>{r.type}</span>
                                    <span className="text-2xl font-black text-slate-200 font-mono">{r.year}</span>
                                </div>
                                <h3 className="text-base font-black text-slate-800 mb-2 leading-snug">{r.title}</h3>

                return localStorage.getItem('agi_logged_in') === 'true';

            const setIsLoggedIn = (val) => {

                localStorage.setItem('agi_logged_in', val ? 'true' : 'false');

                _setCurrentDomain(domain);

            const [dragOverIndex, setDragOverIndex] = useState(null);

                try {
                    return JSON.parse(localStorage.getItem('agi_read_topics')) || [];
                } catch (e) { return []; }
            });

                if (!readTopics.includes(topic)) {
                    const updated = [...readTopics, topic];
                    setReadTopics(updated);
                    localStorage.setItem('agi_read_topics', JSON.stringify(updated));
                }
            };

            const handleDragStart = (e, index) => {
                dragItemRef.current = index;
                e.dataTransfer.effectAllowed = "move";
                e.dataTransfer.setData("text/plain", String(index));

                const target = e.currentTarget;
                setTimeout(() => {
                    if (target) target.style.opacity = '0.4';
                }, 0);
            };

            const handleDragOver = (e, index) => {
                e.preventDefault();
                if (dragItemRef.current === null || dragItemRef.current === index) return;
                setDragOverIndex(index);
            };

            const handleDrop = (e, targetIndex) => {
                e.preventDefault();
                const draggedIdx = dragItemRef.current;
                if (draggedIdx === null || draggedIdx === targetIndex) return;

                const newKeywords = [...customKeywords];
                const draggedItem = displayedKw[draggedIdx];
                const targetItem = displayedKw[targetIndex];

                const actualDraggedIdx = newKeywords.findIndex(kw => kw.id === draggedItem.id);
                const actualTargetIdx = newKeywords.findIndex(kw => kw.id === targetItem.id);

                if (actualDraggedIdx !== -1 && actualTargetIdx !== -1) {
                    const [removed] = newKeywords.splice(actualDraggedIdx, 1);
                    newKeywords.splice(actualTargetIdx, 0, removed);
                    setCustomKeywords(newKeywords);
                }

                dragItemRef.current = null;
                setDragOverIndex(null);
            };

            const handleDragEnd = (e) => {
                if (e.currentTarget) e.currentTarget.style.opacity = '1';
                dragItemRef.current = null;
                setDragOverIndex(null);
            };

            const [kwExpanded, setKwExpanded] = useState(false);
            const [kwSearchQuery, setKwSearchQuery] = useState('');

            const navigateTo = (v) => {
                if ((v === 'results' || v === 'profile') && !isLoggedIn) { setView('gate'); return; }
                setView(v);
            };

            const filteredKw = customKeywords.filter(kw =>
                kw.text.toLowerCase().includes(kwSearchQuery.toLowerCase())
            );

                                                            onDrop={(e) => handleDrop(e, i)}
                                                            onDragEnd={handleDragEnd}
                                                            className={`group px-4 py-3 text-slate-100 rounded-xl transition-all duration-200 font-semibold border flex items-center justify-between gap-3 text-left relative cursor-grab active:cursor-grabbing ${dragOverIndex === i ? 'bg-slate-800 border-indigo-500 scale-[1.01] shadow-lg shadow-indigo-500/20' :
                                                                'bg-slate-800/80 border-slate-700 hover:bg-slate-800 hover:border-slate-600'
                                                                }`}
                                                        >
                                                            <div className="flex items-center gap-2.5 min-w-0 flex-1">
                                                                <GripVertical className="w-4 h-4 text-slate-500 hover:text-slate-300 transition-colors flex-shrink-0" />
                                                                <div
                                                                    onClick={() => { setCurrentDomain(kw.text); navigateTo('results'); }}
                                                                    className="flex items-center gap-2 min-w-0 flex-1 cursor-pointer select-none py-1 hover:text-indigo-400 transition-colors"
                                                                >
                                                                    <Database className="w-3.5 h-3.5 text-indigo-400 group-hover:text-indigo-200 flex-shrink-0" />
                                                                    <span className="text-sm truncate">{kw.text}</span>
                                                                </div>
                                                            </div>
                                                            <div className="flex flex-col items-end gap-0.5 flex-shrink-0 select-none">
                                                                <span className="bg-emerald-500/20 text-emerald-400 text-[10px] px-1.5 py-0.5 rounded font-black whitespace-nowrap">{tr.todayN(kw.dailyUpdates)}</span>
                                                                <span className="text-slate-500 text-[10px]">{kw.count} {tr.pieceUnit}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                                {filteredKw.length > 10 && (
                                                    <div className="flex justify-center">
                                                        <button onClick={() => setKwExpanded(!kwExpanded)} className="flex items-center gap-2 text-indigo-300 hover:text-white font-bold text-xs px-5 py-2 rounded-full border border-indigo-500/30 hover:border-indigo-400 transition-all bg-indigo-500/15">
                                                            {kwExpanded ? (<><ChevronDown className="w-3.5 h-3.5 rotate-180" />{tr.collapse}</>) : (<><ChevronDown className="w-3.5 h-3.5" />{tr.expandAll(filteredKw.length)}</>)}
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </>
                                    ) : (
                                        /* Non-logged-in CTA */
                                        <div className="max-w-2xl mx-auto">
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                                                {[{ n: '15,420+', l: '全球每週新增文獻' }, { n: '30+', l: '企業專屬監測關鍵字' }, { n: '3,000+', l: '全球頂尖研發人才庫' }].map(s => (
                                                    <div key={s.l} className="bg-slate-800/60 border border-slate-700 rounded-xl p-5 text-center">
                                                        <div className="text-2xl font-black text-white font-mono mb-1">{s.n}</div>
                                                        <div className="text-xs text-slate-400 font-medium">{s.l}</div>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => setView('contact')} className="px-10 py-4 bg-indigo-600 text-white font-medium text-base rounded-2xl hover:bg-indigo-500 transition-colors shadow-2xl shadow-indigo-500/30 flex items-center gap-3 mx-auto">
                                                <Sparkles className="w-5 h-5" />{tr.heroCta}
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {!isLoggedIn && (
                                <>
                                    <ROICalculator tr={tr} setView={setView} />
                                    <DatabaseShowcase tr={tr} />
                                    <ReportAccess tr={tr} />
                                </>
                            )}
                            <SubscribedUpdates isLoggedIn={isLoggedIn} setView={navigateTo} setIsLoggedIn={setIsLoggedIn} tr={tr} setCurrentDomain={setCurrentDomain} customKeywords={customKeywords} readTopics={readTopics} markAsRead={markAsRead} />
                            {!isLoggedIn && (
                                <>
                                    <PricingSection tr={tr} setView={setView} />
                                </>
                            )}
                            {isLoggedIn && (
                                <QuarterlyReportsBlock setView={setView} tr={tr} />
                            )}
                        </div>
                    )}

                    {view === 'allSubscriptions' && <AllSubscriptionsPage setView={setView} isLoggedIn={isLoggedIn} setIsLoggedIn={setIsLoggedIn} tr={tr} customKeywords={customKeywords} setCustomKeywords={setCustomKeywords} readTopics={readTopics} markAsRead={markAsRead} />}
                    {view === 'gate' && <LoginGatePage setIsLoggedIn={(v) => { setIsLoggedIn(v); if (v) setView('results'); }} setView={setView} tr={tr} />}
                    {view === 'reportsList' && <ReportsListPage setView={setView} isLoggedIn={isLoggedIn} setIsLoggedIn={setIsLoggedIn} tr={tr} />}
                    {view === 'contact' && <ContactFormPage setView={setView} tr={tr} />}
                    {view === 'reportDetail' && <ReportDetailPage setView={setView} tr={tr} customKeywords={customKeywords} />}
                    {view === 'results' && (isLoggedIn ? <SearchResultsPage setView={setView} currentDomain={currentDomain} setCurrentAuthor={setCurrentAuthor} tr={tr} /> : <LoginGatePage setIsLoggedIn={(v) => { setIsLoggedIn(v); if (v) setView('results'); }} setView={setView} tr={tr} />)}
                    {view === 'profile' && (isLoggedIn ? <AuthorProfilePage author={currentAuthor} setView={setView} tr={tr} /> : <LoginGatePage setIsLoggedIn={(v) => { setIsLoggedIn(v); if (v) setView('profile'); }} setView={setView} tr={tr} />)}
                    
                    <Footer />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
