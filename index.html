                                    { label: tr.navSubscribe, id: 'subscribe' },
                                    { label: tr.navPricing, id: 'pricing' },
                                ].map(item => (
                                    <button key={item.id} onClick={() => scrollToSection(item.id)}

                                        {item.label}
                                    </button>
                                ))}
                                <button onClick={() => setView('contact')}
                                    className="text-sm font-bold text-indigo-600 hover:text-indigo-700 transition-colors flex items-center gap-1.5 whitespace-nowrap">
                                    <Mail className="w-4 h-4" />{tr.navContact}
                                </button>
                            </div>
                        )}

                        {(currentView === 'results' || currentView === 'profile') && isLoggedIn && (
                            <div className="hidden md:flex flex-1 mx-8 max-w-lg items-center gap-2 relative">
                                <span className="text-xs font-semibold text-slate-400 whitespace-nowrap">{tr.monitorLabel}:</span>
                                <div className="relative">
                                    <button onClick={() => setDomainOpen(!domainOpen)} className="bg-slate-50 border border-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-semibold flex items-center gap-2 text-sm hover:bg-slate-100 transition-colors">
                                        <Database className="w-3.5 h-3.5 text-indigo-400" />
                                        <span className="max-w-[200px] truncate">{currentDomain || '—'}</span>
                                        <ChevronDown className={`w-3.5 h-3.5 transition-transform ${domainOpen ? 'rotate-180' : ''}`} />
                                    </button>
                                    {domainOpen && (
                                        <div className="absolute top-full left-0 mt-1.5 w-80 bg-white border border-slate-100 rounded-xl shadow-xl z-50 animate-fadeIn overflow-hidden">
                                            <div className="px-3 py-2 text-[10px] font-bold text-slate-400 bg-slate-50 border-b border-slate-100 tracking-wider uppercase">{tr.yourKeywords}</div>
                                            {customKeywords.map(kw => (
                                                <button key={kw.id} onClick={() => { setCurrentDomain(kw.text); setDomainOpen(false); setView('results'); }}
                                                    className={`w-full text-left px-4 py-2.5 text-sm hover:bg-slate-50 transition-colors flex items-center justify-between gap-2 ${currentDomain === kw.text ? 'text-indigo-600 font-bold bg-indigo-50/50 border-l-2 border-indigo-500' : 'text-slate-700 border-l-2 border-transparent'}`}>
                                                    <span className="truncate">{kw.text}</span>
                                                    <span className="text-xs text-slate-400 flex-shrink-0">{kw.count} {tr.pieceUnit}</span>
                                                </button>
                                            ))}
                                            <div className="border-t border-slate-100 p-2 bg-slate-50">
                                                <button onClick={() => { setDomainOpen(false); setView('landing'); }} className="w-full text-center px-3 py-1.5 text-xs text-indigo-600 font-bold hover:bg-indigo-50 rounded-lg transition-colors">
                                                    {tr.manageBtn}
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        <div className="flex gap-4 items-center">
                            {isLoggedIn && (
                                <div className="relative">
                                    <button onClick={() => setCompanyOpen(!companyOpen)} className="flex items-center gap-2 text-[15px] font-bold text-[#002f5d] hover:text-blue-700 transition-colors">
                                        <Building2 className="w-5 h-5" />
                                        <span>您好！ 華藝數位股份有限公司</span>
                                    </button>
                                    {companyOpen && (
                                        <div className="absolute top-full left-0 mt-2 w-72 bg-white border border-slate-100 rounded-xl shadow-lg z-50 overflow-hidden">
                                            {Object.keys(companyVersions).map(c => (
                                                <button key={c} onClick={() => { setCurrentCompany(c); setCompanyOpen(false); }}
                                                    className={`w-full text-left px-4 py-2.5 text-sm transition-colors ${currentCompany === c ? 'bg-indigo-50 text-indigo-700 font-bold' : 'text-slate-700 hover:bg-slate-50'}`}>
                                                    {c}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                            <div className="relative">
                                <button onClick={() => setLangOpen(!langOpen)} className="flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors px-2 py-1.5 rounded-lg hover:bg-slate-50">
                                    <Languages className="w-4 h-4" />
                                    <span className="hidden sm:inline">{lang}</span>
                                    <ChevronDown className="w-3 h-3" />
                                </button>
                                {langOpen && (
                                    <div className="absolute top-full right-0 mt-1.5 w-36 bg-white border border-slate-100 rounded-xl shadow-lg z-50 overflow-hidden">
                                        {['繁體中文', '简体中文', 'English'].map(l => (
                                            <button key={l} onClick={() => { setLang(l); setLangOpen(false); }}
                                                className={`w-full text-left px-4 py-2.5 text-sm transition-colors ${lang === l ? 'bg-indigo-50 text-indigo-700 font-bold' : 'text-slate-700 hover:bg-slate-50'}`}>
                                                {l}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                            {isLoggedIn ? (
                                <div className="flex items-center gap-2.5 border-l border-slate-100 pl-4">
                                    <div className="w-7 h-7 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-[10px]">RD</div>
                                    <div className="hidden sm:flex flex-col leading-none">
                                        <span className="text-xs font-bold text-slate-800">{tr.loggedInAs}</span>
                                        <span className="text-[10px] text-emerald-500 font-semibold">{tr.loggedInLabel}</span>
                                    </div>
                                    <button onClick={() => setIsLoggedIn(false)} className="text-xs text-slate-400 hover:text-slate-600 ml-1">{tr.logoutBtn}</button>
                                </div>
                            ) : (
                                <button onClick={() => setIsLoggedIn(true)} className="px-4 py-2 bg-indigo-600 text-white rounded-lg font-semibold text-sm hover:bg-indigo-700 transition-colors shadow-sm whitespace-nowrap">
                                    {tr.loginBtn}
                                </button>
                            )}
                        </div>
                    </nav>
                </div>
            );
        };

        // ─── LOGIN GATE PAGE ───────────────────────────────────────────
        const LoginGatePage = ({ setIsLoggedIn, setView, tr }) => (
            <div className="min-h-[70vh] flex items-center justify-center px-4 animate-fadeIn">
                <div className="max-w-md w-full text-center">
                    <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                        <Lock className="w-8 h-8 text-indigo-400" />
                    </div>
                    <h2 className="text-2xl font-black text-slate-900 mb-3">{tr.gateTitle}</h2>
                    <p className="text-slate-500 mb-8 leading-relaxed">{tr.gateDesc}</p>
                    <button onClick={() => setIsLoggedIn(true)} className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors shadow-md mb-3">
                        {tr.gateBtn}
                    </button>
                    <button onClick={() => setView('landing')} className="w-full py-3 border border-slate-200 text-slate-600 font-medium rounded-xl hover:bg-slate-50 transition-colors text-sm">
                        {tr.gateBack}
                    </button>
                </div>
            </div>
        );

        // ─── DATABASE SHOWCASE ─────────────────────────────────────────
        // ─── ROI CALCULATOR ────────────────────────────────────────────
        const roiPlans = (tr) => ([
            { name: tr.roiPlanStarter, target: tr.roiPlanStarterTarget, price: 350000, max: 30, kwCount: 20, freq: tr.roiPlanStarterFreq },
            { name: tr.roiPlanPro, target: tr.roiPlanProTarget, price: 600000, max: 80, kwCount: 50, freq: tr.roiPlanProFreq, featured: true },
            { name: tr.roiPlanFlagship, target: tr.roiPlanFlagshipTarget, price: 1000000, max: Infinity, kwCount: 100, freq: tr.roiPlanFlagshipFreq },
        ]);
        const fmtNT = (n) => 'NT$ ' + Math.round(n).toLocaleString('en-US');

        const ROICalculator = ({ tr, setView }) => {
            const [headcount, setHeadcount] = useState(80);
            const [salary, setSalary] = useState(1200000);

            const plans = roiPlans(tr);
            const plan = plans.find(p => headcount <= p.max) || plans[plans.length - 1];

            const totalPayroll = headcount * salary;
            const wastedCost = Math.round(totalPayroll * 0.21);
            const netSavings = Math.max(wastedCost - plan.price, 0);
            const multiplier = (wastedCost / plan.price).toFixed(1);

            return (
                <div id="roi" className="py-20 bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950 relative overflow-hidden">
                    <div className="absolute inset-0 dot-grid opacity-20"></div>
                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-rose-500/10 rounded-full blur-[100px] pointer-events-none"></div>
                    <div className="max-w-6xl mx-auto px-6 relative z-10">
                        <div className="text-center mb-12">
                            <span className="inline-flex items-center gap-1.5 bg-rose-500/15 text-rose-300 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider mb-5">
                                <Calculator className="w-3.5 h-3.5" />{tr.roiBadge}
                            </span>
                            <h2 className="section-title-white text-3xl md:text-4xl mb-4 max-w-3xl mx-auto leading-tight">{tr.roiTitle}</h2>
                            <p className="text-slate-400 max-w-2xl mx-auto leading-relaxed text-sm">{tr.roiSubtitle}</p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-5 gap-8 bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 md:p-10 shadow-2xl">
                            {/* Inputs */}
                            <div className="lg:col-span-2 flex flex-col gap-8 justify-center">
                                <div>
                                    <div className="flex items-center justify-between mb-2">
                                        <label className="text-slate-300 text-sm font-bold flex items-center gap-2"><Users className="w-4 h-4 text-indigo-400" />{tr.roiInputHeadcount}</label>
                                        <span className="text-white font-black font-mono text-lg">{headcount.toLocaleString()} {tr.roiPeopleUnit}</span>
                                    </div>
                                    <input type="range" min="5" max="500" step="5" value={headcount}
                                        onChange={(e) => setHeadcount(Number(e.target.value))}
                                        className="w-full accent-indigo-500 h-2 rounded-lg cursor-pointer" />
                                </div>
                                <div>
                                    <div className="flex items-center justify-between mb-2">
                                        <label className="text-slate-300 text-sm font-bold flex items-center gap-2"><Coins className="w-4 h-4 text-amber-400" />{tr.roiInputSalary}</label>
                                        <span className="text-white font-black font-mono text-lg">{fmtNT(salary)}</span>
                                    </div>
                                    <input type="range" min="600000" max="3000000" step="50000" value={salary}
                                        onChange={(e) => setSalary(Number(e.target.value))}
                                        className="w-full accent-amber-500 h-2 rounded-lg cursor-pointer" />
                                </div>

                                <div className="bg-slate-800/60 border border-slate-700 rounded-2xl p-4 flex items-start gap-3">
                                    <Flame className="w-5 h-5 text-rose-400 flex-shrink-0 mt-0.5" />
                                    <p className="text-xs text-slate-400 leading-relaxed">{tr.roiFootnote}</p>
                                </div>
                            </div>

                            {/* Output */}
                            <div className="lg:col-span-3 flex flex-col justify-center gap-5">
                                <div className="bg-rose-950/40 border border-rose-500/30 rounded-2xl p-6">
                                    <div className="text-rose-300 text-xs font-bold uppercase tracking-wider mb-2 flex items-center gap-2"><AlertCircle className="w-3.5 h-3.5" />{tr.roiWasteLabel}</div>
                                    <div className="text-3xl md:text-4xl font-black text-rose-400 font-mono">{fmtNT(wastedCost)}</div>
                                </div>

                                <div className="bg-emerald-950/40 border border-emerald-500/30 rounded-2xl p-6 relative overflow-hidden">
                                    <div className="absolute -right-6 -top-6 w-28 h-28 bg-emerald-500/20 rounded-full blur-2xl pointer-events-none"></div>
                                    <div className="text-emerald-300 text-xs font-bold uppercase tracking-wider mb-2 flex items-center gap-2 relative z-10"><PiggyBank className="w-3.5 h-3.5" />{tr.roiSavingsLabel}</div>
                                    <div className="text-4xl md:text-5xl font-black text-emerald-400 font-mono relative z-10">{fmtNT(netSavings)}</div>
                                    <div className="mt-3 flex flex-wrap items-center gap-2 relative z-10">
                                        <span className="bg-emerald-500 text-white text-xs font-black px-3 py-1.5 rounded-full">{tr.roiMultiplier(multiplier)}</span>
                                        <span className="text-slate-400 text-xs">{tr.roiPlanLabel}: <b className="text-white">{plan.name}</b> · {fmtNT(plan.price)}{tr.roiPerYear} · {plan.target}</span>
                                    </div>
                                </div>

                                <button onClick={() => setView('contact')}
                                    className="w-full sm:w-auto self-start px-8 py-3.5 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-2xl transition-colors shadow-xl shadow-indigo-500/20 flex items-center gap-2.5">
                                    <Sparkles className="w-4 h-4" />{tr.roiCta}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ─── PRICING SECTION ───────────────────────────────────────────
        const PricingSection = ({ tr, setView }) => {
            const plans = roiPlans(tr);
            return (
                <div id="pricing" className="py-20 bg-white">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="text-center mb-14">
                            <span className="inline-flex items-center gap-1.5 bg-indigo-50 text-indigo-600 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider mb-5">
                                <Tag className="w-3.5 h-3.5" />{tr.pricingBadge}
                            </span>
                            <h2 className="section-title text-3xl md:text-4xl mb-4">{tr.pricingTitle}</h2>
                            <p className="text-slate-500 max-w-2xl mx-auto leading-relaxed">{tr.pricingSubtitle}</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
                            {plans.map((plan, i) => (
                                <div key={plan.name} className={`relative rounded-3xl p-8 border transition-all card-hover ${plan.featured ? 'border-indigo-500 shadow-2xl shadow-indigo-500/10 md:-translate-y-4 bg-white' : 'border-slate-200 bg-white'}`}>
                                    {plan.featured && (
                                        <span className="absolute -top-3.5 left-1/2 -translate-x-1/2 bg-indigo-600 text-white text-xs font-black px-4 py-1.5 rounded-full flex items-center gap-1.5 shadow-lg whitespace-nowrap">
                                            <Star className="w-3.5 h-3.5 fill-white" />{tr.pricingRecommendedBadge}
                                        </span>
                                    )}
                                    <div className={`inline-block px-4 py-1.5 rounded-full text-sm font-black mb-5 ${i === 0 ? 'bg-teal-100 text-teal-700' : i === 1 ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-800 text-white'}`}>
                                        {plan.name}
                                    </div>
                                    <div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">{tr.pricingFeatureAudience}</div>
                                    <div className="text-sm text-slate-600 mb-6 leading-relaxed min-h-[40px]">{plan.target}</div>

                                    <div className="space-y-4 mb-8 border-t border-slate-100 pt-6">
                                        <div className="flex items-center justify-between">
                                            <span className="text-sm text-slate-500">{tr.pricingFeatureKeywords}</span>
                                            <span className="font-black text-slate-900">{plan.kwCount} {tr.pricingKeywordUnit}</span>
                                        </div>
                                        <div className="flex items-center justify-between">
                                            <span className="text-sm text-slate-500">{tr.pricingFeatureAdjust}</span>
                                            <span className="font-black text-slate-900">{plan.freq}</span>
                                        </div>
                                    </div>

                                    {/*
                                    <div>
                                        <span className="text-3xl font-black text-slate-900 font-mono">{fmtNT(plan.price)}</span>
                                        <span className="text-slate-400 text-sm">{tr.roiPerYear}</span>
                                    </div>
                                    */}
                                </div>
                            ))}
                        </div>

                        <div className="flex justify-center mt-12">
                            <button onClick={() => setView('contact')}
                                className="px-9 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-2xl transition-colors shadow-xl shadow-indigo-500/20 flex items-center gap-2.5">
                                <Sparkles className="w-4 h-4" />{tr.pricingCta}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ─── CONTACT FORM PAGE ─────────────────────────────────────────
        const ContactFormPage = ({ setView, tr }) => {
            const [submitted, setSubmitted] = useState(false);
            const [form, setForm] = useState({ company: '', name: '', email: '', phone: '', headcount: '', plan: tr.roiPlanPro, message: '' });
            const handleChange = (field) => (e) => setForm(f => ({ ...f, [field]: e.target.value }));
            const handleSubmit = (e) => { e.preventDefault(); setSubmitted(true); };

            if (submitted) {
                return (
                    <div className="min-h-[70vh] flex items-center justify-center px-4 animate-fadeIn">
                        <div className="max-w-md w-full text-center">
                            <div className="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                <Check className="w-8 h-8 text-emerald-500" />
                            </div>
                            <h2 className="text-2xl font-black text-slate-900 mb-3">{tr.contactSuccessTitle}</h2>
                            <p className="text-slate-500 mb-8 leading-relaxed">{tr.contactSuccessDesc}</p>
                            <button onClick={() => setView('landing')} className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors shadow-md">
                                {tr.backHome}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="animate-fadeIn max-w-2xl mx-auto px-6 py-12 min-h-[70vh]">
                    <button onClick={() => setView('landing')} className="flex items-center gap-1.5 text-sm text-slate-500 hover:text-indigo-600 mb-8 transition-colors font-medium">
                        <ArrowLeft className="w-4 h-4" />{tr.backHome}
                    </button>
                    <div className="mb-10 text-center">
                        <span className="inline-flex items-center gap-1.5 bg-indigo-50 text-indigo-600 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider mb-5">
                            <Sparkles className="w-3.5 h-3.5" />{tr.contactPageBadge}
                        </span>
                        <h1 className="section-title text-3xl md:text-4xl mb-4">{tr.contactPageTitle}</h1>
                        <p className="text-slate-500 max-w-lg mx-auto leading-relaxed">{tr.contactPageSubtitle}</p>
                    </div>

                    <form onSubmit={handleSubmit} className="bg-white border border-slate-100 rounded-3xl shadow-sm p-7 md:p-9 space-y-5">
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                            <div>
                                <label className="text-xs font-bold text-slate-500 mb-1.5 flex items-center gap-1.5"><Building2 className="w-3.5 h-3.5" />{tr.contactCompany}</label>
                                <input required value={form.company} onChange={handleChange('company')} type="text"
                                    className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 mb-1.5 flex items-center gap-1.5"><Users className="w-3.5 h-3.5" />{tr.contactName}</label>
                                <input required value={form.name} onChange={handleChange('name')} type="text"
                                    className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                            </div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                            <div>
                                <label className="text-xs font-bold text-slate-500 mb-1.5 flex items-center gap-1.5"><Mail className="w-3.5 h-3.5" />{tr.contactEmail}</label>
                                <input required value={form.email} onChange={handleChange('email')} type="email"
                                    className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 mb-1.5 flex items-center gap-1.5"><Phone className="w-3.5 h-3.5" />{tr.contactPhone}</label>
                                <input value={form.phone} onChange={handleChange('phone')} type="tel"
                                    className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                            </div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                            <div>
                                <label className="text-xs font-bold text-slate-500 mb-1.5 flex items-center gap-1.5"><Tag className="w-3.5 h-3.5" />{tr.contactPlan}</label>
                                <select value={form.plan} onChange={handleChange('plan')}
                                    className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white">
                                    {[tr.roiPlanStarter, tr.roiPlanPro, tr.roiPlanFlagship, tr.contactPlanUndecided].map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 mb-1.5 flex items-center gap-1.5"><Users className="w-3.5 h-3.5" />{tr.contactHeadcount}</label>
                                <input value={form.headcount} onChange={handleChange('headcount')} type="number" min="1"
                                    className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                            </div>
                        </div>
                        <div>
                            <label className="text-xs font-bold text-slate-500 mb-1.5 flex items-center gap-1.5"><PenTool className="w-3.5 h-3.5" />{tr.contactMessage}</label>
                            <textarea value={form.message} onChange={handleChange('message')} rows="4"
                                className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"></textarea>
                        </div>
                        <button type="submit"
                            className="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-2xl transition-colors shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2.5">
                            <Send className="w-4 h-4" />{tr.contactSubmit}
                        </button>
                    </form>
                </div>
            );
        };

        const DatabaseShowcase = ({ tr }) => (
            <div id="features" className="py-20 bg-slate-900 relative overflow-hidden">
                <div className="absolute inset-0" style={{ backgroundImage: 'radial-gradient(rgba(99,102,241,0.12) 1.5px,transparent 1.5px)', backgroundSize: '32px 32px' }}></div>
                <div className="max-w-6xl mx-auto px-6 relative z-10">
                    <div className="text-center mb-14">
                        <h2 className="section-title-white text-3xl md:text-4xl mb-4">{tr.dbTitle}</h2>
                        <p className="text-slate-400 max-w-2xl mx-auto leading-relaxed">{tr.dbSubtitle}</p>
                    </div>
                    <div className="flex flex-wrap justify-center gap-3 mb-14">
                        {[
                            { label: 'IEEE', color: 'text-blue-400' },
                            { label: 'Nature', color: 'text-slate-200' },
                            { label: 'ACM', color: 'text-red-400' },
                            { label: 'Science', color: 'text-emerald-400' },
                            { label: 'ACS', color: 'text-sky-400' },
                            { label: 'PubMed', color: 'text-indigo-400' },
                            { label: 'arXiv', color: 'text-orange-400' },
                            { label: 'RSC', color: 'text-rose-400' },
                        ].map(({ label, color }) => (
                            <div key={label} className={`bg-slate-800 border border-slate-700 hover:border-indigo-500/50 px-5 py-2.5 rounded-xl font-black text-xl ${color} transition-all hover:scale-105 cursor-default`}>{label}</div>
                        ))}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {[
                            { icon: Zap, color: 'indigo', title: tr.dbIctTitle, desc: tr.dbIctDesc, hi: 'IEEE、ACM、ArXiv' },
                            { icon: Layers, color: 'emerald', title: tr.dbChemTitle, desc: tr.dbChemDesc, hi: 'ACS、RSC' },
                            { icon: Activity, color: 'rose', title: tr.dbBioTitle, desc: tr.dbBioDesc, hi: 'PubMed、Nature' },
                        ].map(({ icon: Icon, color, title, desc }) => (
                            <div key={title} className={`bg-slate-800/50 border border-slate-700 rounded-2xl p-7 hover:-translate-y-1 transition-all group`}>
                                <div className={`w-12 h-12 bg-${color}-500/15 rounded-xl flex items-center justify-center text-${color}-400 mb-5 group-hover:bg-${color}-500 group-hover:text-white transition-colors`}>
                                    <Icon className="w-6 h-6" />
                                </div>
                                <h3 className="text-lg font-black text-white mb-2.5 whitespace-nowrap">{title}</h3>
                                <p className="text-slate-400 text-sm leading-relaxed">{desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        // ─── SUBSCRIBED UPDATES ────────────────────────────────────────
        const SubscribedUpdates = ({ isLoggedIn, setView, setIsLoggedIn, tr, setCurrentDomain, customKeywords, readTopics, markAsRead }) => {
            if (!isLoggedIn) return (
                <div id="subscribe" className="max-w-6xl mx-auto px-6 py-14">
                    <div className="text-center mb-10">
                        <span className="inline-flex items-center gap-1.5 bg-indigo-50 text-indigo-600 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider mb-5">
                            <Bell className="w-3.5 h-3.5" />{tr.subIntroBadge}
                        </span>
                        <h2 className="section-title text-3xl md:text-4xl mb-4">{tr.subIntroTitle}</h2>
                        <p className="text-slate-500 max-w-2xl mx-auto leading-relaxed">{tr.subIntroDesc}</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                        {[
                            { icon: Bell, color: 'indigo', title: tr.subIntroF1Title, desc: tr.subIntroF1Desc },
                            { icon: TrendingUp, color: 'rose', title: tr.subIntroF2Title, desc: tr.subIntroF2Desc },
                            { icon: Users, color: 'emerald', title: tr.subIntroF3Title, desc: tr.subIntroF3Desc },
                        ].map(({ icon: Icon, color, title, desc }) => (
                            <div key={title} className="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 card-hover">
                                <div className={`w-11 h-11 bg-${color}-50 rounded-xl flex items-center justify-center text-${color}-500 mb-4`}>
                                    <Icon className="w-5 h-5" />
                                </div>
                                <h3 className="text-sm font-black text-slate-800 mb-2">{title}</h3>
                                <p className="text-xs text-slate-500 leading-relaxed">{desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const pinnedTopics = (() => {
                try {
                    return JSON.parse(localStorage.getItem('agi_pinned_topics')) || [];
                } catch (e) { return []; }
            })();
            const pausedTopics = (() => {
                try {
                    return JSON.parse(localStorage.getItem('agi_paused_topics')) || [];
                } catch (e) { return []; }
            })();

            const subscribedUpdates = customKeywords
                .map(kw => ({
                    id: kw.id,
                    topic: kw.text,
                    newPapers: Math.floor(kw.count * 0.15) + kw.dailyUpdates * 3,
                    newTalents: Math.max(1, Math.floor(kw.dailyUpdates / 2)),
                    hasBreakthrough: kw.hasBreakthrough
                }))
                .filter(d => !pausedTopics.includes(d.topic));

            const sortedUpdates = [...subscribedUpdates].sort((a, b) => {
                const aPinned = pinnedTopics.includes(a.topic);
                const bPinned = pinnedTopics.includes(b.topic);
                if (aPinned && !bPinned) return -1;
                if (!aPinned && bPinned) return 1;
                return 0;
            });

            return (
                <div className="max-w-6xl mx-auto px-6 py-14 animate-fadeIn">
                    <div className="flex items-center justify-between mb-8 pb-4 border-b border-slate-100">
                        <div className="flex items-center gap-3">
                            <Bell className="w-5 h-5 text-indigo-500" />
                            <h2 className="text-xl font-black text-slate-800">{tr.subTitle}</h2>
                        </div>
                        <a href="?view=all-subscriptions" target="_blank" className="text-xs font-bold text-indigo-600 hover:text-indigo-800 flex items-center gap-1 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-full transition-colors">
                            {tr.viewAllBtn} <ArrowRight className="w-3.5 h-3.5" />
                        </a>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                        {sortedUpdates.slice(0, 3).map((d, i) => {
                            return (
                                <div key={i} className="bg-white rounded-xl border border-slate-100 shadow-sm p-6 card-hover flex flex-col justify-between min-h-[180px] relative">
                                    <div className="w-full">
                                        <h3 className="text-sm font-bold text-slate-700 mb-5 leading-snug line-clamp-2 pr-2">{d.topic}</h3>
                                        <div className="grid grid-cols-2 gap-3 mb-2">
                                            <div
                                                onClick={() => {
                                                    localStorage.setItem('agi_current_domain', d.topic);
                                                    localStorage.setItem('agi_results_tab', 'article');
                                                    markAsRead(d.topic);
                                                    setCurrentDomain(d.topic);
                                                    setView('results');
                                                }}
                                                className="relative group/box bg-indigo-50 hover:bg-indigo-100/70 border border-transparent hover:border-indigo-200/50 rounded-xl p-3 text-center transition-all duration-300 hover:-translate-y-1 hover:shadow-md cursor-pointer overflow-hidden pb-5"
                                            >
                                                <div className="text-2xl font-black text-indigo-600 font-mono">+{d.newPapers}</div>
                                                <div className="text-[10px] text-slate-500 font-semibold mt-1 uppercase tracking-wider">{tr.subNewDocs}</div>
                                                <div className="absolute inset-x-0 bottom-0 bg-indigo-600 text-white text-[9px] py-1 font-bold tracking-wider opacity-0 group-hover/box:opacity-100 translate-y-full group-hover/box:translate-y-0 transition-all duration-200 flex items-center justify-center gap-1 select-none">
                                                    <Search className="w-2.5 h-2.5" /> 點擊查看文章
                                                </div>
                                            </div>
                                            <div
                                                onClick={() => {
                                                    localStorage.setItem('agi_current_domain', d.topic);
                                                    localStorage.setItem('agi_results_tab', 'talent');
                                                    markAsRead(d.topic);
                                                    setCurrentDomain(d.topic);
                                                    setView('results');
                                                }}
                                                className="relative group/box bg-emerald-50 hover:bg-emerald-100/70 border border-transparent hover:border-emerald-200/50 rounded-xl p-3 text-center transition-all duration-300 hover:-translate-y-1 hover:shadow-md cursor-pointer overflow-hidden pb-5"
                                            >
                                                <div className="text-2xl font-black text-emerald-600 font-mono">{d.newTalents}</div>
                                                <div className="text-[10px] text-slate-500 font-semibold mt-1 uppercase tracking-wider">{tr.subNewTalents}</div>
                                                <div className="absolute inset-x-0 bottom-0 bg-emerald-600 text-white text-[9px] py-1 font-bold tracking-wider opacity-0 group-hover/box:opacity-100 translate-y-full group-hover/box:translate-y-0 transition-all duration-200 flex items-center justify-center gap-1 select-none">
                                                    <Users className="w-2.5 h-2.5" /> 點擊查看名單
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                        {sortedUpdates.length === 0 && (
                            <div className="col-span-3 text-center py-8 text-slate-400 text-sm bg-white rounded-2xl border border-slate-100">
                                暫無活躍關注的主題
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ─── ALL SUBSCRIPTIONS PAGE ────────────────────────────────────
        const AllSubscriptionsPage = ({ setView, isLoggedIn, setIsLoggedIn, tr, customKeywords, setCustomKeywords, readTopics, markAsRead }) => {
            const [searchQuery, setSearchQuery] = window.React.useState('');
            const [pausedExpanded, setPausedExpanded] = window.React.useState(false);

            const [pinnedTopics, setPinnedTopics] = window.React.useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('agi_pinned_topics')) || [];
                } catch (e) { return []; }
            });

            const [pausedTopics, setPausedTopics] = window.React.useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('agi_paused_topics')) || [];
                } catch (e) { return []; }
            });

            const dragItemRef = window.React.useRef(null);
            const [dragOverIndex, setDragOverIndex] = window.React.useState(null);

            if (!isLoggedIn) {
                return <LoginGatePage setIsLoggedIn={setIsLoggedIn} setView={setView} tr={tr} />;
            }

            const togglePin = (e, topic) => {
                e.stopPropagation();
                let updated;
                if (pinnedTopics.includes(topic)) {
                    updated = pinnedTopics.filter(t => t !== topic);
                } else {
                    if (pinnedTopics.length >= 3) {
                        alert("最多只能釘選 3 個核心技術！");
                        return;
                    }
                    updated = [...pinnedTopics, topic];
                }
                setPinnedTopics(updated);
                localStorage.setItem('agi_pinned_topics', JSON.stringify(updated));
            };

            const togglePause = (e, topic) => {
                e.stopPropagation();
                let updatedPinned = pinnedTopics;
                if (pinnedTopics.includes(topic)) {
                    updatedPinned = pinnedTopics.filter(t => t !== topic);
                    setPinnedTopics(updatedPinned);
                    localStorage.setItem('agi_pinned_topics', JSON.stringify(updatedPinned));
                }

                let updated;
                if (pausedTopics.includes(topic)) {
                    updated = pausedTopics.filter(t => t !== topic);
                } else {
                    updated = [...pausedTopics, topic];
                }
                setPausedTopics(updated);
                localStorage.setItem('agi_paused_topics', JSON.stringify(updated));
            };

            const subscribedUpdates = customKeywords.map(kw => ({
                id: kw.id,
                topic: kw.text,
                newPapers: Math.floor(kw.count * 0.15) + kw.dailyUpdates * 3,
                newTalents: Math.max(1, Math.floor(kw.dailyUpdates / 2)),
                hasBreakthrough: kw.hasBreakthrough
            }));

            const filtered = subscribedUpdates.filter(d =>
                d.topic.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const pinnedList = filtered.filter(d => pinnedTopics.includes(d.topic));
            const activeList = filtered.filter(d => !pinnedTopics.includes(d.topic) && !pausedTopics.includes(d.topic));
            const pausedList = filtered.filter(d => pausedTopics.includes(d.topic));

            const handleDragStart = (e, index, isPinnedSection) => {
                dragItemRef.current = { index, isPinned: isPinnedSection };
                e.dataTransfer.effectAllowed = "move";
                e.dataTransfer.setData("text/plain", String(index));

                const target = e.currentTarget;
                setTimeout(() => {
                    if (target) target.style.opacity = '0.4';
                }, 0);
            };

            const handleDragOver = (e, index, isPinnedSection) => {
                e.preventDefault();
                if (dragItemRef.current === null) return;
                if (dragItemRef.current.isPinned !== isPinnedSection) return;
                if (dragItemRef.current.index === index) return;
                setDragOverIndex({ index, isPinned: isPinnedSection });
            };

            const handleDrop = (e, targetIndex, isPinnedSection = false) => {
                e.preventDefault();
                if (dragItemRef.current === null) return;
                if (dragItemRef.current.isPinned !== isPinnedSection) return;

                const draggedIdx = dragItemRef.current.index;
                if (draggedIdx === targetIndex) return;

                const sourceList = isPinnedSection ? pinnedList : activeList;
                const targetItem = sourceList[targetIndex];
                const draggedItem = sourceList[draggedIdx];

                const newKeywords = [...customKeywords];
                const actualDraggedIdx = newKeywords.findIndex(kw => kw.id === draggedItem.id);
                const actualTargetIdx = newKeywords.findIndex(kw => kw.id === targetItem.id);

                if (actualDraggedIdx !== -1 && actualTargetIdx !== -1) {
                    const [removed] = newKeywords.splice(actualDraggedIdx, 1);
                    newKeywords.splice(actualTargetIdx, 0, removed);
                    setCustomKeywords(newKeywords);
                }

                dragItemRef.current = null;
                setDragOverIndex(null);
            };

            const handleDragEnd = (e) => {
                if (e.currentTarget) e.currentTarget.style.opacity = '1';
                dragItemRef.current = null;
                setDragOverIndex(null);
            };

            const handleNavigate = (topic, tabName) => {
                markAsRead(topic);
                localStorage.setItem('agi_current_domain', topic);
                localStorage.setItem('agi_results_tab', tabName);
                const url = new URL(window.location.href);
                url.searchParams.set('view', 'results');
                window.location.href = url.toString();
            };

            const renderCard = (d, i, isPinnedSection = false, isPausedCard = false) => {
                const isPinned = pinnedTopics.includes(d.topic);
                const isPaused = pausedTopics.includes(d.topic);

                return (
                    <div key={d.id}
                        draggable={!isPausedCard ? "true" : "false"}
                        onDragStart={(e) => handleDragStart(e, i, isPinnedSection)}
                        onDragOver={(e) => handleDragOver(e, i, isPinnedSection)}
                        onDragLeave={() => setDragOverIndex(null)}
                        onDrop={(e) => handleDrop(e, i, isPinnedSection)}
                        onDragEnd={handleDragEnd}
                        className={`group bg-white rounded-2xl border p-6 flex flex-col justify-between min-h-[190px] transition-all duration-200 relative ${isPausedCard ? 'opacity-65 grayscale bg-slate-50/50 animate-fadeIn' : 'cursor-grab active:cursor-grabbing hover:shadow-md'
                            } ${dragOverIndex && dragOverIndex.index === i && dragOverIndex.isPinned === isPinnedSection
                                ? 'border-indigo-500 scale-[1.01] shadow-lg shadow-indigo-500/20'
                                : 'border-slate-100 hover:border-slate-200 shadow-sm'
                            }`}
                    >
                        {/* Top-Right Controls */}
                        <div className="absolute top-4 right-4 flex items-center gap-1 z-20">
                            {!isPausedCard && (
                                <button
                                    onClick={(e) => togglePin(e, d.topic)}
                                    className={`p-1.5 rounded-lg hover:bg-slate-100 transition-all duration-200 flex items-center justify-center ${isPinned ? 'text-amber-500 bg-amber-50' : 'text-slate-400 hover:text-amber-500'
                                        }`}
                                    title={isPinned ? "取消最上方釘選" : "釘選到最上方 (最多3個)"}
                                >
                                    <Pin className={`w-3.5 h-3.5 ${isPinned ? 'fill-amber-500 text-amber-500' : ''}`} />
                                </button>
                            )}
                            <button
                                onClick={(e) => togglePause(e, d.topic)}
                                className={`p-1.5 rounded-lg transition-all duration-200 flex items-center justify-center ${isPaused ? 'text-indigo-600 bg-indigo-50 hover:bg-indigo-100' : 'text-slate-400 hover:text-rose-500 hover:bg-rose-50'
                                    }`}
                                title={isPaused ? "恢復關注此領域" : "暫停關注此領域"}
                            >
                                {isPaused ? <EyeOff className="w-3.5 h-3.5" /> : <Eye className="w-3.5 h-3.5" />}
                            </button>
                        </div>

                        <div>
                            <div className="flex items-start gap-2.5 mb-5 pr-16">
                                {!isPausedCard && <GripVertical className="w-4 h-4 text-slate-400 mt-1 flex-shrink-0 cursor-grab active:cursor-grabbing" />}
                                <h3 className="text-base font-bold text-slate-800 leading-snug line-clamp-2 min-h-[3rem] flex-1 select-none pr-1">{d.topic}</h3>
                            </div>
                            <div className="grid grid-cols-2 gap-4 mb-2">
                                <div
                                    onClick={() => !isPausedCard && handleNavigate(d.topic, 'article')}
                                    className={`relative group/box rounded-xl p-4 text-center border transition-all duration-300 ${isPausedCard ? 'bg-slate-100 border-slate-200 cursor-not-allowed' :
                                        'bg-indigo-50/50 hover:bg-indigo-100/70 border-indigo-50/20 hover:-translate-y-1 hover:shadow-md cursor-pointer overflow-hidden pb-5'
                                        }`}
                                >
                                    <div className="text-2xl font-black text-indigo-600 font-mono">+{d.newPapers}</div>
                                    <div className="text-[10px] text-slate-500 font-semibold mt-1 uppercase tracking-wider">{tr.subNewDocs}</div>
                                    {!isPausedCard && (
                                        <div className="absolute inset-x-0 bottom-0 bg-indigo-600 text-white text-[9px] py-1 font-bold tracking-wider opacity-0 group-hover/box:opacity-100 translate-y-full group-hover/box:translate-y-0 transition-all duration-200 flex items-center justify-center gap-1 select-none">
                                            <Search className="w-2.5 h-2.5" /> 點擊查看文章
                                        </div>
                                    )}
                                </div>
                                <div
                                    onClick={() => !isPausedCard && handleNavigate(d.topic, 'talent')}
                                    className={`relative group/box rounded-xl p-4 text-center border transition-all duration-300 ${isPausedCard ? 'bg-slate-100 border-slate-200 cursor-not-allowed' :
                                        'bg-emerald-50/50 hover:bg-emerald-100/70 border-emerald-50/20 hover:-translate-y-1 hover:shadow-md cursor-pointer overflow-hidden pb-5'
                                        }`}
                                >
                                    <div className="text-2xl font-black text-emerald-600 font-mono">{d.newTalents}</div>
                                    <div className="text-[10px] text-slate-500 font-semibold mt-1 uppercase tracking-wider">{tr.subNewTalents}</div>
                                    {!isPausedCard && (
                                        <div className="absolute inset-x-0 bottom-0 bg-emerald-600 text-white text-[9px] py-1 font-bold tracking-wider opacity-0 group-hover/box:opacity-100 translate-y-full group-hover/box:translate-y-0 transition-all duration-200 flex items-center justify-center gap-1 select-none">
                                            <Users className="w-2.5 h-2.5" /> 點擊查看名單
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-6xl mx-auto px-4 py-12 animate-fadeIn">
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 pb-4 border-b border-slate-200">
                        <div>
                            <h1 className="text-2xl font-black text-slate-900">{tr.allSubTitle}</h1>
                            <p className="text-slate-500 text-sm mt-1">{tr.allSubDesc}</p>
                        </div>
                        <div className="flex items-center gap-3 w-full md:w-auto">
                            <div className="relative flex-1 md:w-80">
                                <Search className="absolute left-3 top-2.5 text-slate-300 w-4 h-4" />
                                <input
                                    type="text"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    placeholder={tr.searchTopicPlaceholder}
                                    className="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm"
                                />
                            </div>
                            <button onClick={() => window.close()} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-sm font-semibold transition-colors">
                                {tr.gateBack}
                            </button>
                        </div>
                    </div>

                    {/* 1. Pinned core technologies */}
                    {pinnedList.length > 0 && (
                        <div className="mb-10 animate-fadeIn">
                            <div className="flex items-center gap-2 mb-4">
                                <Pin className="w-5 h-5 text-amber-500 fill-amber-500 animate-pulse" />
                                <h2 className="text-lg font-black text-slate-800">已釘選的核心攻關技術</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {pinnedList.map((d, i) => renderCard(d, i, true))}
                            </div>
                        </div>
                    )}

                    {/* 2. Main updates section */}
                    <div className="mb-10">
                        <div className="flex items-center gap-2 mb-4">
                            <Bell className="w-5 h-5 text-indigo-500" />
                            <h2 className="text-lg font-black text-slate-800">訂閱主題最新動態</h2>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {activeList.map((d, i) => renderCard(d, i, false))}
                        </div>
                        {activeList.length === 0 && (
                            <div className="text-center py-8 text-slate-400 text-sm bg-white rounded-2xl border border-slate-100">
                                暫無活躍關注的主題
                            </div>
                        )}
                    </div>

                    {/* 3. Paused topics list */}
                    {pausedList.length > 0 && (
                        <div className="border-t border-slate-200 pt-8 mt-12">
                            <button
                                onClick={() => setPausedExpanded(!pausedExpanded)}
                                className="flex items-center justify-between w-full text-slate-600 hover:text-slate-800 transition-colors font-bold text-sm bg-slate-100 hover:bg-slate-200 px-5 py-3 rounded-xl"
                            >
                                <span className="flex items-center gap-2">
                                    <EyeOff className="w-4 h-4 text-slate-400" />
                                    已暫停關注的領域 ({pausedList.length})
                                </span>
                                <ChevronDown className={`w-4 h-4 transition-transform duration-200 ${pausedExpanded ? 'rotate-180' : ''}`} />
                            </button>
                            {pausedExpanded && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-6 animate-fadeIn">
                                    {pausedList.map((d, i) => renderCard(d, i, false, true))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // ─── REPORT ACCESS ─────────────────────────────────────────────
        const mechItems = (tr) => ([
            { before: tr.mechCol1Before, after: tr.mechCol1After, pain: tr.mechCol1Pain, benefit: tr.mechCol1Benefit },
            { before: tr.mechCol2Before, after: tr.mechCol2After, pain: tr.mechCol2Pain, benefit: tr.mechCol2Benefit },
            { before: tr.mechCol3Before, after: tr.mechCol3After, pain: tr.mechCol3Pain, benefit: tr.mechCol3Benefit },
        ]);

        const ReportAccess = ({ tr }) => {
            const items = mechItems(tr);
            return (
                <div className="py-24 bg-slate-50 border-t border-slate-100 relative overflow-hidden">
                    <div className="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-indigo-500/20 to-transparent"></div>
                    
                    <div className="max-w-6xl mx-auto px-6 relative z-10">
                        <div className="text-center mb-16">
                            <span className="inline-flex items-center gap-2 bg-indigo-100/80 text-indigo-700 text-xs font-black px-4 py-2 rounded-full uppercase tracking-widest mb-6 shadow-sm border border-indigo-200/50">
                                <Sparkles className="w-4 h-4 text-indigo-500" />{tr.mechBadge}
                            </span>
                            <h2 className="section-title text-3xl md:text-4xl mb-4 leading-tight">{tr.mechTitle}</h2>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {items.map((item, i) => (
                                <div key={i} className="bg-white shadow-[0px_0px_15px_rgba(0,0,0,0.09)] p-9 space-y-6 relative overflow-hidden flex flex-col group hover:-translate-y-2 transition-transform duration-300 rounded-2xl">
                                    <div className="w-24 h-24 bg-indigo-500 rounded-full absolute -right-5 -top-7 group-hover:scale-110 transition-transform duration-300">
                                        <p className="absolute bottom-6 left-7 text-white text-2xl font-black">{String(i + 1).padStart(2, '0')}</p>
                                    </div>
                                    
                                    <div className="flex flex-col gap-2 mt-4 relative z-10">
                                        <div className="text-sm font-semibold text-slate-400">
                                            {item.before}
                                        </div>
                                        <div className="text-indigo-400">
                                            <ChevronDown className="w-5 h-5" />
                                        </div>
                                        <div className="font-bold text-xl text-slate-800">
                                            {item.after}
                                        </div>
                                    </div>

                                    <div className="w-full space-y-4 pt-6 border-t border-slate-100 mt-auto relative z-10">
                                        <div className="flex items-start gap-3">
                                            <div className="mt-1 flex-shrink-0">
                                                <X className="w-4 h-4 text-rose-500" strokeWidth={1.5} />
                                            </div>
                                            <p className="text-sm text-slate-500 leading-6">{item.pain}</p>
                                        </div>
                                        <div className="flex items-start gap-3">
                                            <div className="mt-1 flex-shrink-0">
                                                <Check className="w-4 h-4 text-emerald-500" strokeWidth={1.5} />
                                            </div>
                                            <p className="text-sm text-slate-600 leading-6">{item.benefit}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ─── SEARCH RESULTS ────────────────────────────────────────────
        const SearchResultsPage = ({ setView, currentDomain, setCurrentAuthor, tr }) => {
            const [tab, setTab] = useState(() => {
                return localStorage.getItem('agi_results_tab') || 'article';
            });
            const [sortBy, setSortBy] = useState('newest');
            const [itemsPerPage, setItemsPerPage] = useState(10);
            const [currentPage, setCurrentPage] = useState(1);
            const handleSetTab = (newTab) => {
                setTab(newTab);
                localStorage.setItem('agi_results_tab', newTab);
            };
            const domainData = domainDataMap[currentDomain] || domainDataMap["GaN-on-Si Epitaxy (氮化鎵矽基磊晶)"];
            const filteredTalents = topTalentList.filter(t => domainData.talentIds.includes(t.id));

            const handleProfile = (id) => {
                const a = topTalentList.find(t => t.id === id);
                if (a) { setCurrentAuthor(a); setView('profile'); } else { alert("暫無詳細檔案。"); }
            };

            const tierColor = { S: 'bg-amber-100 text-amber-700 border-amber-200', A: 'bg-indigo-100 text-indigo-700 border-indigo-200', B: 'bg-slate-100 text-slate-600 border-slate-200' };

            return (
                <div className="max-w-6xl mx-auto px-4 py-8 grid grid-cols-12 gap-6 animate-fadeIn">
                    {/* Sidebar filter */}
                    <div className="col-span-12 lg:col-span-3">
                        <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm sticky top-24">
                            <div className="flex items-center gap-2 font-black text-slate-800 mb-5 pb-4 border-b border-slate-100 text-base">
                                <Filter className="w-4 h-4 text-indigo-500" />{tr.filterTitle}
                            </div>
                            <div className="mb-5 relative">
                                <Search className="absolute left-3 top-2.5 text-slate-300 w-4 h-4" />
                                <input type="text" placeholder={tr.filterSearch} className="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm" />
                            </div>
                            <div className="space-y-6">
                                <div>
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2.5">排序依照</h4>
                                    <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="w-full p-2 bg-slate-50 border border-slate-100 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-400 cursor-pointer">
                                        <option value="newest">出版時間新&gt;舊</option>
                                        <option value="oldest">出版時間舊&gt;新</option>
                                    </select>
                                </div>
                                <div>
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2.5">每頁顯示</h4>
                                    <select value={itemsPerPage} onChange={(e) => { setItemsPerPage(Number(e.target.value)); setCurrentPage(1); }} className="w-full p-2 bg-slate-50 border border-slate-100 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-400 cursor-pointer">
                                        <option value={10}>10筆</option>
                                        <option value={30}>30筆</option>
                                        <option value={50}>50筆</option>
                                    </select>
                                </div>
                                {[
                                    { label: tr.filterRegion, items: ['台灣', '韓國', '日本', '中國', '美國'] },
                                    { label: tr.filterYear, items: ['2025–2026', '2023–2024', '2021–2022', '2020 及以前'] },
                                    { label: tr.filterPub, items: ['IEEE', 'IOP', 'SPIE', 'Wiley', 'ACS', 'RSC', 'Nature'] },
                                ].map(sec => (
                                    <div key={sec.label}>
                                        <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2.5">{sec.label}</h4>
                                        <div className="space-y-2">
                                            {sec.items.map(item => (
                                                <label key={item} className="flex items-center gap-2.5 text-sm text-slate-700 cursor-pointer hover:text-indigo-600 transition-colors">
                                                    <input type="checkbox" className="w-3.5 h-3.5 rounded text-indigo-600 focus:ring-indigo-400" defaultChecked={sec.items.indexOf(item) < 3} />
                                                    {item}
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Main content */}
                    <div className="col-span-12 lg:col-span-9">
                        <div className="mb-6">
                            <h2 className="text-2xl font-black text-slate-900 mb-1 whitespace-nowrap truncate">{tr.srTitle}{currentDomain}</h2>
                            <p className="text-slate-500 text-sm">{tr.srDesc(domainData.articleCount, domainData.talentCount)}</p>
                        </div>

                        <div className="flex border-b border-slate-200 mb-7 gap-6">
                            {[
                                { id: 'article', label: tr.tabArticles, icon: FileText },
                                { id: 'talent', label: tr.tabTalents, icon: Users },
                            ].map(({ id, label, icon: Icon }) => (
                                <button key={id} onClick={() => handleSetTab(id)} className={`flex items-center gap-2 pb-3.5 font-bold text-sm transition-colors border-b-2 ${tab === id ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>
                                    <Icon className="w-4 h-4" />{label}
                                </button>
                            ))}
                        </div>

                        {tab === 'article' && (
                            <div className="space-y-4 animate-fadeIn">
                                {[...domainData.articles]
                                    .sort((a, b) => sortBy === 'newest' ? b.year - a.year : a.year - b.year)
                                    .slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage)
                                    .map(item => (
                                    <div key={item.id} className="bg-white p-5 rounded-xl border border-slate-100 hover:border-indigo-200 hover:shadow-md transition-all group card-hover">
                                        <div className="flex justify-between items-start mb-3 gap-4">
                                            {item.url ? (
                                                <a href={item.url} target="_blank" rel="noopener noreferrer" className="block">
                                                    <h3 className="text-base font-bold text-slate-800 group-hover:text-indigo-700 transition-colors leading-snug hover:underline decoration-indigo-500">{item.title}</h3>
                                                </a>
                                            ) : (
                                                <h3 className="text-base font-bold text-slate-800 group-hover:text-indigo-700 transition-colors leading-snug">{item.title}</h3>
                                            )}
                                            <span className="text-xs font-mono font-bold bg-slate-100 text-slate-500 px-2.5 py-1 rounded-lg flex-shrink-0">{item.year}</span>
                                        </div>
                                        <div className="text-sm text-slate-500 mb-3 flex items-center gap-1.5 flex-wrap">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{tr.authorsLabel}</span>
                                            {item.authors.map((a, i) => (
                                                <span key={i} onClick={() => handleProfile(a.talentId)} className={`px-2 py-0.5 rounded text-xs font-semibold ${a.talentId ? 'bg-indigo-50 text-indigo-600 cursor-pointer hover:bg-indigo-100 border border-indigo-100' : 'text-slate-600 bg-slate-50'}`}>{a.name}</span>
                                            ))}
                                            <span className="text-slate-200">|</span>
                                            <span className="italic text-xs">{item.journal}</span>
                                        </div>
                                        <div className="flex justify-between items-center mt-3 pt-3 border-t border-slate-50">
                                            <div className="flex gap-1.5 flex-wrap">
                                                {item.tags.map(tag => <span key={tag} className="text-[10px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded">{tag}</span>)}
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className="text-xs font-bold text-slate-400 flex items-center gap-1"><GitMerge className="w-3.5 h-3.5" />{tr.citLabel} {item.citations}</span>
                                                <button onClick={(e) => { e.stopPropagation(); window.open(item.url || '#', '_blank'); }} className="px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-bold rounded-lg transition-colors flex items-center gap-1.5 shadow-sm border border-indigo-100 hover:border-indigo-200">
                                                    <ExternalLink className="w-3.5 h-3.5" /> 查看原文
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'talent' && (
                            <div className="space-y-4 animate-fadeIn">
                                {filteredTalents.map(t => (
                                    <div key={t.id} className="bg-white p-5 rounded-xl border border-slate-100 hover:border-indigo-200 hover:shadow-md transition-all flex flex-col sm:flex-row gap-5 items-start sm:items-center card-hover">
                                        <div className="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center text-xl font-black text-white flex-shrink-0 shadow-sm">{t.name[0]}</div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-2 mb-1 flex-wrap">
                                                <h3 className="text-lg font-black text-slate-900 cursor-pointer hover:text-indigo-600 transition-colors" onClick={() => handleProfile(t.id)}>{t.name}</h3>
                                                {t.isActive && <span className="text-[10px] font-black bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded border border-emerald-200">{tr.activeTag}</span>}
                                                <span className="text-[10px] font-semibold bg-slate-100 text-slate-500 px-2 py-0.5 rounded">{t.title}</span>
                                            </div>
                                            <p className="text-xs text-slate-500 font-medium flex items-center gap-1 mb-2.5"><Building2 className="w-3 h-3" />{t.school} {t.department}</p>
                                            <div className="flex flex-wrap gap-1.5">
                                                {t.keywords?.slice(0, 4).map((kw, i) => <span key={i} className="text-[10px] font-bold bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded border border-indigo-100">{kw.text}</span>)}
                                            </div>
                                        </div>
                                        <div className="flex sm:flex-col items-center sm:items-end gap-4 sm:gap-3 w-full sm:w-auto pt-3 sm:pt-0 border-t sm:border-t-0 border-slate-50 mt-3 sm:mt-0 flex-shrink-0">
                                            <div className="text-center sm:text-right">
                                                <div className="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-0.5">{tr.hIndexLabel}</div>
                                                <div className="text-2xl font-black text-indigo-600 font-mono">{t.hIndex}</div>
                                            </div>
                                            <button onClick={() => handleProfile(t.id)} className="px-4 py-2 bg-slate-900 text-white text-sm font-bold rounded-lg hover:bg-indigo-600 transition-colors flex items-center gap-1.5 shadow-sm whitespace-nowrap">
                                                {tr.viewProfileBtn}<ArrowRight className="w-3.5 h-3.5" />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ─── AUTHOR PROFILE ────────────────────────────────────────────
        const AuthorProfilePage = ({ author, setView, tr }) => {
            if (!author) return null;
            return (
                <div className="max-w-6xl mx-auto px-4 py-8 animate-fadeIn">
                    <button onClick={() => setView('results')} className="flex items-center gap-1.5 text-sm text-slate-500 hover:text-indigo-600 mb-6 transition-colors font-medium">
                        <ArrowLeft className="w-4 h-4" />{tr.backToResults}
                    </button>

                    {/* Top card */}
                    <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-7 mb-6">
                        <div className="flex flex-col md:flex-row gap-7 items-start">
                            <div className="w-24 h-24 bg-slate-900 rounded-2xl flex items-center justify-center text-4xl font-black text-white flex-shrink-0">{author.name[0]}</div>
                            <div className="flex-1 w-full">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-start gap-5 mb-5">
                                    <div>
                                        <h1 className="text-2xl font-black text-slate-900 flex items-center gap-3 flex-wrap">
                                            {author.name}
                                            <span className="text-xs font-bold bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full border border-indigo-100">{author.title}</span>
                                        </h1>
                                        <p className="text-slate-500 mt-1.5 flex items-center gap-2 text-sm font-medium"><Building2 className="w-4 h-4" />{author.school} · {author.department}</p>
                                        <p className="text-slate-400 mt-1 text-xs">{author.alias}</p>
                                    </div>
                                    <div className="bg-slate-50 border border-slate-100 p-4 rounded-xl min-w-[220px]">
                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">{tr.contactTitle}</div>
                                        <div className="flex items-center gap-2 text-sm text-slate-700 mb-2"><Mail className="w-4 h-4 text-indigo-400" />{author.email}</div>
                                        <div className="flex items-center gap-2 text-sm text-slate-700"><Phone className="w-4 h-4 text-indigo-400" />{author.phone}</div>
                                    </div>
                                </div>
