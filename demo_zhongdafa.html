        // ─── ALL SUBSCRIPTIONS PAGE ────────────────────────────────────
        const AllSubscriptionsPage = ({ setView, isLoggedIn, setIsLoggedIn, tr, customKeywords, setCustomKeywords, readTopics, markAsRead }) => {
            const [searchQuery, setSearchQuery] = window.React.useState('');

            const [pinnedTopics, setPinnedTopics] = window.React.useState(() => {

            const [pausedTopics, setPausedTopics] = window.React.useState(() => {
                try {

            if (!isLoggedIn) {

            const togglePin = (e, topic) => {
                e.stopPropagation();
                let updated;
                if (pinnedTopics.includes(topic)) {
                    updated = pinnedTopics.filter(t => t !== topic);
                } else {
                    if (pinnedTopics.length >= 3) {
                        alert("最多只能釘選 3 個核心技術！");
                        return;
                    }
                    updated = [...pinnedTopics, topic];
                }
                setPinnedTopics(updated);
                localStorage.setItem('agi_pinned_topics', JSON.stringify(updated));
            };

            const togglePause = (e, topic) => {
                e.stopPropagation();
                let updatedPinned = pinnedTopics;
                if (pinnedTopics.includes(topic)) {
                    updatedPinned = pinnedTopics.filter(t => t !== topic);
                    setPinnedTopics(updatedPinned);
                    localStorage.setItem('agi_pinned_topics', JSON.stringify(updatedPinned));
                }

                let updated;
                if (pausedTopics.includes(topic)) {
                    updated = pausedTopics.filter(t => t !== topic);

                    updated = [...pausedTopics, topic];
                }
                setPausedTopics(updated);
                localStorage.setItem('agi_paused_topics', JSON.stringify(updated));
            };

            const subscribedUpdates = customKeywords.map(kw => ({
                id: kw.id,
                topic: kw.text,
                newPapers: Math.floor(kw.count * 0.15) + kw.dailyUpdates * 3,
                newTalents: Math.max(1, Math.floor(kw.dailyUpdates / 2)),
                hasBreakthrough: kw.hasBreakthrough
            }));

            const filtered = subscribedUpdates.filter(d =>
                d.topic.toLowerCase().includes(searchQuery.toLowerCase())

                dragItemRef.current = { index, isPinned: isPinnedSection };
                e.dataTransfer.effectAllowed = "move";
                e.dataTransfer.setData("text/plain", String(index));

                const target = e.currentTarget;
                setTimeout(() => {
                    if (target) target.style.opacity = '0.4';
                }, 0);
            };

            const handleDragOver = (e, index, isPinnedSection) => {
                e.preventDefault();
                if (dragItemRef.current === null) return;
                if (dragItemRef.current.isPinned !== isPinnedSection) return;
                if (dragItemRef.current.index === index) return;
                setDragOverIndex({ index, isPinned: isPinnedSection });
            };

            const handleDrop = (e, targetIndex, isPinnedSection = false) => {
                e.preventDefault();
                if (dragItemRef.current === null) return;
                if (dragItemRef.current.isPinned !== isPinnedSection) return;

                const draggedIdx = dragItemRef.current.index;
                if (draggedIdx === targetIndex) return;

                const sourceList = isPinnedSection ? pinnedList : activeList;
                const targetItem = sourceList[targetIndex];
                const draggedItem = sourceList[draggedIdx];

                const newKeywords = [...customKeywords];
                const actualDraggedIdx = newKeywords.findIndex(kw => kw.id === draggedItem.id);
                const actualTargetIdx = newKeywords.findIndex(kw => kw.id === targetItem.id);

                if (actualDraggedIdx !== -1 && actualTargetIdx !== -1) {
                    const [removed] = newKeywords.splice(actualDraggedIdx, 1);
                    newKeywords.splice(actualTargetIdx, 0, removed);
                    setCustomKeywords(newKeywords);
                }

                dragItemRef.current = null;
                setDragOverIndex(null);
            };

            const handleDragEnd = (e) => {
                if (e.currentTarget) e.currentTarget.style.opacity = '1';
                dragItemRef.current = null;
                setDragOverIndex(null);
            };

            const handleNavigate = (topic, tabName) => {

                localStorage.setItem('agi_current_domain', topic);

                        onDragLeave={() => setDragOverIndex(null)}
                        onDrop={(e) => handleDrop(e, i, isPinnedSection)}

                        </h3>
                        <p className="text-slate-500 text-sm mb-6">{tr.rSec3Desc}</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {topTalentList.slice(0, 4).map(t => (
                                <div key={t.id} className="flex gap-4 p-4 border border-slate-100 rounded-xl card-hover cursor-pointer bg-slate-50/50">
                                    <div className="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center text-white font-black flex-shrink-0 text-lg">{t.name[0]}</div>
                                    <div className="min-w-0">
                                        <div className="flex items-center gap-2 mb-1 flex-wrap">
                                            <h4 className="font-black text-slate-900 text-base">{t.name}</h4>
                                            <span className="bg-indigo-100 text-indigo-700 text-[10px] font-black px-2 py-0.5 rounded-full">H-Index: {t.hIndex}</span>
                                        </div>
                                        <p className="text-xs text-slate-500 font-medium flex items-center gap-1 mb-2"><Building2 className="w-3 h-3" />{t.school}</p>
                                        <div className="flex flex-wrap gap-1">
                                            {t.keywords.slice(0, 3).map(kw => <span key={kw.text} className="text-[10px] bg-white border border-slate-200 text-slate-600 px-2 py-0.5 rounded font-semibold">{kw.text}</span>)}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Section 4 */}
                    <section className="bg-white p-7 rounded-2xl border border-slate-100 shadow-sm">
                        <h3 className="text-xl font-black text-indigo-600 mb-4 flex items-center gap-3">
                            <span className="w-7 h-7 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center text-xs font-black">4</span>{tr.rSec4}
                        </h3>
                        <p className="text-slate-500 text-sm mb-6">{tr.rSec4Desc}</p>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                            <div className="bg-amber-50 p-5 rounded-xl border border-amber-100">
                                <h4 className="text-amber-800 font-bold mb-4 flex items-center gap-2 text-sm"><Star className="w-4 h-4" />{tr.rHighCit}</h4>
                                {[{ t: "Wafer-Scale Integration of Silicon Photonic Transceivers for Data Center Applications", y: "Nature Photonics", a: "劉教授 et al.", c: 124 },
                                { t: "Low-Power Silicon Photonic Optical Phased Array for LiDAR and Optical Computing", y: "Nature", a: "Sun, J. et al.", c: 215 }].map((p, i) => (
                                    <div key={i} className="bg-white p-4 rounded-xl border border-amber-100 mb-3 last:mb-0 shadow-sm">
                                        <div className="text-sm font-bold text-slate-800 hover:text-indigo-600 cursor-pointer mb-2 leading-snug">{p.t}</div>
                                        <div className="flex justify-between items-center text-xs text-slate-500">
                                            <span>{p.y} · {p.a}</span>
                                            <span className="font-black text-amber-600 flex items-center gap-1 bg-amber-100 px-2 py-0.5 rounded"><GitMerge className="w-3 h-3" />{p.c}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-emerald-50 p-5 rounded-xl border border-emerald-100">
                                <h4 className="text-emerald-800 font-bold mb-4 flex items-center gap-2 text-sm"><Zap className="w-4 h-4" />{tr.rNewResults}</h4>
                                {[{ t: "50G-PON: Architecture, Technology, and Field Trial Demonstration", y: "2024 IEEE Network", a: "張博士 et al." },
                                { t: "Co-Packaged Optics Architecture for Next-Generation 800G AI Cluster Interconnects", y: "2024 Journal of Lightwave Technology", a: "劉教授 et al." }].map((p, i) => (
                                    <div key={i} className="bg-white p-4 rounded-xl border border-emerald-100 mb-3 last:mb-0 shadow-sm">
                                        <div className="text-sm font-bold text-slate-800 hover:text-indigo-600 cursor-pointer mb-2 leading-snug">{p.t}</div>
                                        <div className="text-xs text-slate-500">{p.y} · {p.a}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        );

        // ─── MAIN APP ──────────────────────────────────────────────────
        const App = () => {
            const [view, setView] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                const v = params.get('view');
                if (v === 'all-subscriptions') return 'allSubscriptions';
                if (v === 'results') return 'results';
                return 'landing';
            });
            const [lang, setLang] = useState('繁體中文');
            const [isLoggedIn, _setIsLoggedIn] = useState(() => {
                // Demo 版本：預設已登入，展示全功能
                return true;
            });
            const setIsLoggedIn = (val) => {
                _setIsLoggedIn(val);
                localStorage.setItem('agi_logged_in', val ? 'true' : 'false');
            };
            const [currentAuthor, setCurrentAuthor] = useState(null);
            const [currentDomain, _setCurrentDomain] = useState(() => {
                return localStorage.getItem('agi_current_domain') || 'PAM4 DSP (四階脈衝調幅數位訊號處理)';
            });
            const setCurrentDomain = (domain) => {
                _setCurrentDomain(domain);
                localStorage.setItem('agi_current_domain', domain);
            };
            const [customKeywords, setCustomKeywords] = useState(defaultKeywords);
            const dragItemRef = useRef(null);
            const [dragOverIndex, setDragOverIndex] = useState(null);

            const [readTopics, setReadTopics] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('agi_read_topics')) || [];
                } catch (e) { return []; }
            });
            const markAsRead = (topic) => {
                if (!readTopics.includes(topic)) {
                    const updated = [...readTopics, topic];
                    setReadTopics(updated);
                    localStorage.setItem('agi_read_topics', JSON.stringify(updated));
                }
            };

            const handleDragStart = (e, index) => {
                dragItemRef.current = index;
                e.dataTransfer.effectAllowed = "move";
                e.dataTransfer.setData("text/plain", String(index));

                const target = e.currentTarget;
                setTimeout(() => {
                    if (target) target.style.opacity = '0.4';
                }, 0);
            };

            const handleDragOver = (e, index) => {
                e.preventDefault();
                if (dragItemRef.current === null || dragItemRef.current === index) return;
                setDragOverIndex(index);
            };

            const handleDrop = (e, targetIndex) => {
                e.preventDefault();
                const draggedIdx = dragItemRef.current;
                if (draggedIdx === null || draggedIdx === targetIndex) return;

                const newKeywords = [...customKeywords];
                const draggedItem = displayedKw[draggedIdx];
                const targetItem = displayedKw[targetIndex];

                const actualDraggedIdx = newKeywords.findIndex(kw => kw.id === draggedItem.id);
                const actualTargetIdx = newKeywords.findIndex(kw => kw.id === targetItem.id);

                if (actualDraggedIdx !== -1 && actualTargetIdx !== -1) {
                    const [removed] = newKeywords.splice(actualDraggedIdx, 1);
                    newKeywords.splice(actualTargetIdx, 0, removed);
                    setCustomKeywords(newKeywords);
                }

                dragItemRef.current = null;
                setDragOverIndex(null);
            };

            const handleDragEnd = (e) => {
                if (e.currentTarget) e.currentTarget.style.opacity = '1';
                dragItemRef.current = null;
                setDragOverIndex(null);
            };

            const [kwExpanded, setKwExpanded] = useState(false);
            const [kwSearchQuery, setKwSearchQuery] = useState('');

            const langCode = lang === 'English' ? 'en' : lang === '简体中文' ? 'zh-CN' : 'zh-TW';
            const tr = TR[langCode];

            const navigateTo = (v) => {
                if ((v === 'results' || v === 'profile') && !isLoggedIn) { setView('gate'); return; }
                setView(v);
            };

            const filteredKw = customKeywords.filter(kw =>
                kw.text.toLowerCase().includes(kwSearchQuery.toLowerCase())
            );
            const displayedKw = kwExpanded ? filteredKw : filteredKw.slice(0, 10);

            return (
                <div className="min-h-screen bg-slate-50">
                    <Header currentView={view} setView={setView} isLoggedIn={isLoggedIn} setIsLoggedIn={(v) => { setIsLoggedIn(v); if (v && view === 'gate') setView('results'); }} currentDomain={currentDomain} setCurrentDomain={setCurrentDomain} customKeywords={customKeywords} lang={lang} setLang={setLang} tr={tr} />

                    {view === 'landing' && (
                        <div className="animate-fadeIn">
                            {/* Hero */}
                            <div className="bg-slate-900 text-white pt-20 pb-24 px-6 relative overflow-hidden">
                                <div className="absolute inset-0 dot-grid opacity-50"></div>
                                <div className="absolute top-0 right-0 w-96 h-96 bg-indigo-600/20 rounded-full blur-[80px] -translate-y-1/3 translate-x-1/3 pointer-events-none"></div>
                                <div className="absolute bottom-0 left-0 w-72 h-72 bg-cyan-500/10 rounded-full blur-[60px] translate-y-1/3 -translate-x-1/3 pointer-events-none"></div>
                                <div className="max-w-5xl mx-auto text-center relative z-10">
                                    <h1 className="text-5xl md:text-6xl font-black mb-5 leading-tight tracking-tight">
                                        <span className="gradient-text">{tr.heroTitle}</span>
                                    </h1>
                                    <p className="text-lg text-slate-400 font-medium mb-10 max-w-2xl mx-auto leading-relaxed">{tr.heroSubtitle}</p>

                                    {isLoggedIn ? (
                                        <>
                                            {/* Dashboard stats */}
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-5 max-w-4xl mx-auto mb-10">
                                                <div className="bg-slate-800/70 backdrop-blur-sm p-6 rounded-2xl border border-slate-700 text-left">
                                                    <div className="text-indigo-400 text-xs font-bold mb-2 flex items-center gap-2 uppercase tracking-wider"><Activity className="w-3.5 h-3.5" />{tr.dashDocsTitle}</div>
                                                    <div className="text-4xl font-black text-white font-mono">15,420 <span className="text-sm font-normal text-slate-400">{tr.dashDocsUnit}</span></div>
                                                    <div className="mt-2 text-xs text-emerald-400 flex items-center gap-1"><TrendingUp className="w-3 h-3" />{tr.dashDocsGrowth}</div>
                                                </div>
                                                <div className="bg-slate-800/70 backdrop-blur-sm p-6 rounded-2xl border border-slate-700 text-left">
                                                    <div className="text-cyan-400 text-xs font-bold mb-2 flex items-center gap-2 uppercase tracking-wider"><Award className="w-3.5 h-3.5" />{tr.dashExpertTitle}</div>
                                                    <div className="text-xl font-black text-white mt-1">{tr.dashExpertVal} <span className="text-sm font-normal text-slate-400">{tr.dashExpertSub}</span></div>
                                                    <div className="mt-2 text-xs text-emerald-400 flex items-center gap-1"><TrendingUp className="w-3 h-3" />{tr.dashExpertTopic}</div>
                                                </div>
                                                <div className="bg-rose-900/40 backdrop-blur-sm p-6 rounded-2xl border border-rose-500/30 text-left">
                                                    <div className="text-rose-400 text-xs font-bold mb-2 flex items-center gap-2 uppercase tracking-wider"><AlertCircle className="w-3.5 h-3.5" />{tr.dashAlertTitle}</div>
                                                    <div className="text-base font-bold text-white leading-snug mt-1">{typeof tr.dashAlertContent === 'function' ? tr.dashAlertContent(customKeywords[0]?.text || '50G-PON') : tr.dashAlertContent}</div>
                                                    <button onClick={() => { setCurrentDomain(customKeywords[0]?.text || "50G-PON"); navigateTo('results'); }} className="mt-3 text-xs bg-rose-500/20 text-rose-300 px-3 py-1.5 rounded-lg font-bold hover:bg-rose-500/30 transition-colors w-full text-left">{tr.dashAlertBtn}</button>
                                                </div>
                                            </div>

                                            {/* Keywords dashboard */}
                                            <div className="bg-white/5 backdrop-blur-xl p-7 rounded-3xl border border-white/10 max-w-4xl mx-auto text-left shadow-2xl">
                                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5 pb-2">
                                                    <h3 className="text-white font-black text-base flex items-center gap-2">
                                                        <Activity className="w-5 h-5 text-indigo-400" />
                                                        {tr.domainTitle}
                                                    </h3>
                                                    <div className="relative w-full sm:w-60">
                                                        <Search className="absolute left-3 top-2.5 text-slate-400 w-3.5 h-3.5" />
                                                        <input
                                                            type="text"
                                                            value={kwSearchQuery}
                                                            onChange={(e) => setKwSearchQuery(e.target.value)}
                                                            placeholder={tr.searchKwPlaceholder}
                                                            className="w-full pl-9 pr-4 py-1.5 bg-slate-800/60 border border-slate-700/60 rounded-xl focus:outline-none focus:ring-1 focus:ring-indigo-400 text-white text-xs placeholder-slate-500"
                                                        />
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5 mb-5">
                                                    {displayedKw.map((kw, i) => (
                                                        <div key={kw.id}
                                                            draggable="true"
                                                            onDragStart={(e) => handleDragStart(e, i)}
                                                            onDragOver={(e) => handleDragOver(e, i)}
                                                            onDragLeave={() => setDragOverIndex(null)}
                                                            onDrop={(e) => handleDrop(e, i)}
                                                            onDragEnd={handleDragEnd}
                                                            className={`group px-4 py-3 text-slate-100 rounded-xl transition-all duration-200 font-semibold border flex items-center justify-between gap-3 text-left relative cursor-grab active:cursor-grabbing ${dragOverIndex === i ? 'bg-slate-800 border-indigo-500 scale-[1.01] shadow-lg shadow-indigo-500/20' :
                                                                'bg-slate-800/80 border-slate-700 hover:bg-slate-800 hover:border-slate-600'
                                                                }`}
                                                        >
                                                            <div className="flex items-center gap-2.5 min-w-0 flex-1">
                                                                <GripVertical className="w-4 h-4 text-slate-500 hover:text-slate-300 transition-colors flex-shrink-0" />
                                                                <div
                                                                    onClick={() => { setCurrentDomain(kw.text); navigateTo('results'); }}
                                                                    className="flex items-center gap-2 min-w-0 flex-1 cursor-pointer select-none py-1 hover:text-indigo-400 transition-colors"
                                                                >
                                                                    <Database className="w-3.5 h-3.5 text-indigo-400 group-hover:text-indigo-200 flex-shrink-0" />
                                                                    <span className="text-sm truncate">{kw.text}</span>
                                                                </div>
                                                            </div>
                                                            <div className="flex flex-col items-end gap-0.5 flex-shrink-0 select-none">
                                                                <span className="bg-emerald-500/20 text-emerald-400 text-[10px] px-1.5 py-0.5 rounded font-black whitespace-nowrap">{tr.todayN(kw.dailyUpdates)}</span>
                                                                <span className="text-slate-500 text-[10px]">{kw.count} {tr.pieceUnit}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                                {filteredKw.length > 10 && (
                                                    <div className="flex justify-center">
                                                        <button onClick={() => setKwExpanded(!kwExpanded)} className="flex items-center gap-2 text-indigo-300 hover:text-white font-bold text-xs px-5 py-2 rounded-full border border-indigo-500/30 hover:border-indigo-400 transition-all bg-indigo-500/15">
                                                            {kwExpanded ? (<><ChevronDown className="w-3.5 h-3.5 rotate-180" />{tr.collapse}</>) : (<><ChevronDown className="w-3.5 h-3.5" />{tr.expandAll(filteredKw.length)}</>)}
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </>
                                    ) : (
                                        /* Non-logged-in CTA */
                                        <div className="max-w-2xl mx-auto">
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                                                {[{ n: '15,420+', l: '全球每週新增文獻' }, { n: '30+', l: '企業專屬監測關鍵字' }, { n: '3,000+', l: '全球頂尖研發人才庫' }].map(s => (
                                                    <div key={s.l} className="bg-slate-800/60 border border-slate-700 rounded-xl p-5 text-center">
                                                        <div className="text-2xl font-black text-white font-mono mb-1">{s.n}</div>
                                                        <div className="text-xs text-slate-400 font-medium">{s.l}</div>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => setIsLoggedIn(true)} className="px-10 py-4 bg-indigo-600 text-white font-black text-base rounded-2xl hover:bg-indigo-500 transition-colors shadow-2xl shadow-indigo-500/30 flex items-center gap-3 mx-auto">
                                                <Shield className="w-5 h-5" />{tr.loginBtn}
                                            </button>
                                            <p className="text-slate-500 text-xs mt-4">{tr.loginCta}</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <DatabaseShowcase tr={tr} />
                            <SubscribedUpdates isLoggedIn={isLoggedIn} setView={navigateTo} setIsLoggedIn={setIsLoggedIn} tr={tr} setCurrentDomain={setCurrentDomain} customKeywords={customKeywords} readTopics={readTopics} markAsRead={markAsRead} />
                            <ReportAccess setView={setView} isLoggedIn={isLoggedIn} setIsLoggedIn={setIsLoggedIn} tr={tr} />
                        </div>
                    )}

                    {view === 'allSubscriptions' && <AllSubscriptionsPage setView={setView} isLoggedIn={isLoggedIn} setIsLoggedIn={setIsLoggedIn} tr={tr} customKeywords={customKeywords} setCustomKeywords={setCustomKeywords} readTopics={readTopics} markAsRead={markAsRead} />}
                    {view === 'gate' && <LoginGatePage setIsLoggedIn={(v) => { setIsLoggedIn(v); if (v) setView('results'); }} setView={setView} tr={tr} />}
                    {view === 'reportsList' && <ReportsListPage setView={setView} isLoggedIn={isLoggedIn} setIsLoggedIn={setIsLoggedIn} tr={tr} />}
                    {view === 'reportDetail' && <ReportDetailPage setView={setView} tr={tr} customKeywords={customKeywords} />}
                    {view === 'results' && (isLoggedIn ? <SearchResultsPage setView={setView} currentDomain={currentDomain} setCurrentAuthor={setCurrentAuthor} tr={tr} /> : <LoginGatePage setIsLoggedIn={(v) => { setIsLoggedIn(v); if (v) setView('results'); }} setView={setView} tr={tr} />)}
                    {view === 'profile' && (isLoggedIn ? <AuthorProfilePage author={currentAuthor} setView={setView} tr={tr} /> : <LoginGatePage setIsLoggedIn={(v) => { setIsLoggedIn(v); if (v) setView('profile'); }} setView={setView} tr={tr} />)}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
